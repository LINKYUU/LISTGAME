<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Game Link.Yu - Auto Spec Sync</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        header { padding: 25px; border-bottom: 1px solid #eee; text-align: center; background: #fff; }
        
        /* SEARCH & FILTER */
        #searchInput { width: 100%; max-width: 500px; padding: 12px 20px; margin: 15px auto; font-size: 16px; border: 2px solid #eee; border-radius: 25px; display: block; outline: none; transition: 0.3s; }
        #searchInput:focus { border-color: #1a73e8; box-shadow: 0 0 8px rgba(26,115,232,0.2); }
        .filter-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .filter-btn { padding: 8px 16px; font-size: 13px; border: none; border-radius: 20px; cursor: pointer; background: #f0f0f0; color: #555; transition: 0.2s; }
        .filter-btn.active { background: #333; color: #fff; }

        /* TABLE */
        .table-wrapper { max-height: 60vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; position: sticky; top: 0; z-index: 10; font-size: 14px; text-transform: uppercase; color: #666; border-bottom: 2px solid #eee; }
        td { padding: 14px 15px; border-bottom: 1px solid #eee; font-size: 15px; }
        .clickable-name { color: #1a73e8; cursor: pointer; font-weight: 600; text-decoration: none; }
        .clickable-name:hover { text-decoration: underline; }

        /* SPEK COLORS (Sesuai Request Gambar) */
        .ket-ringan { color: #28a745; font-weight: bold; }
        .ket-sedang { color: #007bff; font-weight: bold; }
        .ket-agak-berat { color: #fd7e14; font-weight: bold; }
        .ket-berat { color: #dc3545; font-weight: bold; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 5vh auto; width: 90%; max-width: 450px; border-radius: 20px; overflow: hidden; position: relative; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 30px; color: white; cursor: pointer; z-index: 100; text-shadow: 0 2px 5px #000; }
        .slider { width: 100%; height: 230px; background: #000; position: relative; }
        .slider img { width: 100%; height: 100%; object-fit: cover; }
        .modal-body { padding: 20px; }
        .req-info { background: #f1f3f4; padding: 15px; border-radius: 12px; font-size: 13px; line-height: 1.6; border-left: 5px solid #1a73e8; margin: 15px 0; }
        .btn-yt { display: block; background: #ff0000; color: white; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; }

        .loading-shimmer { color: #999; font-style: italic; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0; color:#d9534f;">LINK.YU GAME STORE</h2>
        <input type="text" id="searchInput" placeholder="Cari judul game...">
        <div class="filter-group">
            <button class="filter-btn" data-filter="Ringan">Ringan</button>
            <button class="filter-btn" data-filter="Sedang">Sedang</button>
            <button class="filter-btn" data-filter="Agak Berat">Agak Berat</button>
            <button class="filter-btn" data-filter="Berat">Berat</button>
        </div>
        <div id="status" style="font-size: 12px; color: #888;">Memuat list game...</div>
    </header>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Nama Game</th>
                    <th>Size</th>
                    <th>Spek</th>
                </tr>
            </thead>
            <tbody id="gameList"></tbody>
        </table>
    </div>
</div>

<div id="gameModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalSlider" class="slider"></div>
        <div class="modal-body">
            <h3 id="modalTitle" style="margin:0;"></h3>
            <p id="modalCategory" style="margin:5px 0; font-weight:bold;"></p>
            <div id="modalReq" class="req-info">Mencari spesifikasi resmi...</div>
            <a id="modalYT" href="#" target="_blank" class="btn-yt">TONTON GAMEPLAY</a>
        </div>
    </div>
</div>

<script src="data_game.js"></script>

<script>
    const API_KEY = "158b3858daed4d67af02a839d14ba445";
    let gamesData = [];
    let currentFilter = null;

    // 1. Inisialisasi Data dari data_game.js
    function init() {
        if (typeof csvData === 'undefined') {
            document.getElementById('status').textContent = "File data_game.js tidak terbaca!";
            return;
        }
        const lines = csvData.trim().split('\n');
        gamesData = lines.slice(1).map(line => {
            const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (cols.length >= 3) {
                return {
                    name: cols[0].replace(/"/g, '').trim(),
                    size: cols[1].trim(),
                    spec: cols[2].trim(), // Spek awal dari CSV
                    realSpec: null // Akan diisi otomatis dari RAWG nanti
                };
            }
        }).filter(g => g);
        render();
    }

    // 2. Tampilkan Tabel
    function render() {
        const list = document.getElementById('gameList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        
        let filtered = gamesData.filter(g => g.name.toLowerCase().includes(search));
        if (currentFilter) filtered = filtered.filter(g => (g.realSpec || g.spec) === currentFilter);

        list.innerHTML = '';
        filtered.forEach((g, index) => {
            const tr = document.createElement('tr');
            // Jika sudah ada realSpec dari RAWG, pakai itu. Jika belum, pakai spec dari CSV.
            const displaySpec = g.realSpec || g.spec;
            const specClass = `ket-${displaySpec.toLowerCase().replace(/\s+/g, '-')}`;

            tr.innerHTML = `
                <td><a class="clickable-name" onclick="openDetail(${index})">${g.name}</a></td>
                <td>${g.size}</td>
                <td id="row-spec-${index}" class="${specClass}">${displaySpec}</td>
            `;
            list.appendChild(tr);
        });
        document.getElementById('status').textContent = `Total: ${filtered.length} Game`;
    }

    // 3. Logika Analisis Spek RAWG (Kunci Utama)
    function analyzeRAWG(text) {
        if (!text) return null;
        const req = text.toLowerCase();
        // Deteksi Berat
        if (req.includes("rtx") || req.includes("gtx 1080") || req.includes("16gb ram") || req.includes("16 gb ram") || req.includes("i7-")) return "Berat";
        // Deteksi Agak Berat
        if (req.includes("gtx 1050") || req.includes("gtx 1650") || req.includes("8gb ram") || req.includes("8 gb ram")) return "Agak Berat";
        // Deteksi Ringan
        if (req.includes("intel hd") || req.includes("gt 730") || req.includes("4gb ram") || req.includes("core 2 duo")) return "Ringan";
        
        return "Sedang"; // Default jika di tengah-tahun
    }

    // 4. Buka Detail & Sync ke RAWG
    async function openDetail(index) {
        const game = gamesData[index];
        const modal = document.getElementById('gameModal');
        const reqDiv = document.getElementById('modalReq');
        const slider = document.getElementById('modalSlider');
        const catText = document.getElementById('modalCategory');

        document.getElementById('modalTitle').textContent = game.name;
        document.getElementById('modalYT').href = `https://www.youtube.com/results?search_query=${game.name}+gameplay+pc`;
        modal.style.display = "block";
        reqDiv.innerHTML = "Menghubungkan ke database RAWG...";
        slider.innerHTML = '<div style="color:white; padding:100px; text-align:center;">Memuat Gambar...</div>';

        try {
            // Step 1: Cari Game
            const searchRes = await fetch(`https://api.rawg.io/api/games?key=${API_KEY}&search=${encodeURIComponent(game.name)}&page_size=1`);
            const searchData = await searchRes.json();

            if (searchData.results.length > 0) {
                const result = searchData.results[0];
                
                // Step 2: Ambil Detail & Screenshot
                const detailRes = await fetch(`https://api.rawg.io/api/games/${result.id}?key=${API_KEY}`);
                const detail = await detailRes.json();
                
                // Ambil Requirements PC (Platform ID 4 = PC)
                const pcInfo = detail.platforms.find(p => p.platform.id === 4);
                const rawText = pcInfo?.requirements?.minimum || "";

                // ANALISIS SPEK BERDASARKAN DATA RAWG
                const detectedSpec = analyzeRAWG(rawText);
                
                if (detectedSpec) {
                    // Update Data Lokal agar di tabel ikut berubah
                    gamesData[index].realSpec = detectedSpec; 
                    render(); // Refresh tabel agar warna kolom Spek berubah otomatis
                    
                    catText.textContent = `Kategori: ${detectedSpec}`;
                    catText.className = `ket-${detectedSpec.toLowerCase().replace(/\s+/g, '-')}`;
                }

                reqDiv.innerHTML = rawText ? rawText.replace(/\n/g, '<br>') : "Spesifikasi detail tidak tersedia.";
                slider.innerHTML = `<img src="${result.background_image}">`;
            } else {
                reqDiv.innerHTML = "Game tidak ditemukan di database RAWG. Menggunakan spek estimasi toko.";
                catText.textContent = `Kategori: ${game.spec}`;
            }
        } catch (e) {
            reqDiv.innerHTML = "Gagal memuat data (Cek koneksi internet).";
        }
    }

    // UI Listeners
    document.getElementById('searchInput').onkeyup = render;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
            const active = btn.classList.contains('active');
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            currentFilter = active ? null : btn.dataset.filter;
            if (!active) btn.classList.add('active');
            render();
        };
    });

    function closeModal() { document.getElementById('gameModal').style.display = "none"; }
    window.onclick = (e) => { if (e.target.id === 'gameModal') closeModal(); };

    // Jalankan
    init();
</script>
</body>
</html>
