<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="6;url=https://www.listgame.my.id/">
<title>LIST GAME LINK.YU — Sudah Pindah</title>
<style>
  :root{
    --accent:#5E9FE8;
    --accent-2:#BF8EDA;
    --accent-3:#72BC8F;
    --bg:#0B0E1A;
    --surface:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.14);
    --text:#FFFFFF;
    --text-soft:rgba(255,255,255,0.68);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(60% 55% at 18% 12%, rgba(94,159,232,0.28), transparent 60%),
      radial-gradient(55% 50% at 85% 18%, rgba(191,142,218,0.24), transparent 60%),
      radial-gradient(60% 60% at 50% 100%, rgba(114,188,143,0.16), transparent 60%),
      var(--bg);
    color:var(--text);
    overflow:hidden;
    position:relative;
    padding:24px;
  }
​
  .grid-overlay{
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size:44px 44px;
    mask-image:radial-gradient(70% 70% at 50% 40%, rgba(0,0,0,0.9), transparent 100%);
    pointer-events:none;
  }
​
  .orb{
    position:absolute;
    border-radius:50%;
    filter:blur(2px);
    opacity:0.55;
    animation:float 12s ease-in-out infinite;
    pointer-events:none;
  }
  .orb-1{width:120px;height:120px;background:radial-gradient(circle at 30% 30%, var(--accent), transparent 70%);top:12%;left:8%;animation-duration:14s;}
  .orb-2{width:90px;height:90px;background:radial-gradient(circle at 30% 30%, var(--accent-2), transparent 70%);top:65%;left:12%;animation-duration:16s;animation-delay:-3s;}
  .orb-3{width:70px;height:70px;background:radial-gradient(circle at 30% 30%, var(--accent-3), transparent 70%);top:20%;right:10%;animation-duration:11s;animation-delay:-6s;}
  .orb-4{width:100px;height:100px;background:radial-gradient(circle at 30% 30%, var(--accent), transparent 70%);bottom:10%;right:14%;animation-duration:13s;animation-delay:-1.5s;}
​
  @keyframes float{
    0%,100%{transform:translateY(0) translateX(0);}
    50%{transform:translateY(-22px) translateX(14px);}
  }
​
  .card{
    position:relative;
    z-index:2;
    width:100%;
    max-width:480px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:40px 36px 32px;
    text-align:center;
    backdrop-filter:blur(18px);
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
    animation:rise 0.7s cubic-bezier(.2,.9,.25,1) both;
  }
​
  @keyframes rise{
    from{opacity:0;transform:translateY(18px) scale(0.98);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
​
  .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:6px 14px;
    border-radius:999px;
    background:rgba(94,159,232,0.16);
    border:1px solid rgba(94,159,232,0.35);
    color:#BFDCFA;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.02em;
    margin-bottom:22px;
  }
  .badge .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--accent-3);
    box-shadow:0 0 0 0 rgba(114,188,143,0.7);
    animation:pulse 1.8s ease-out infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(114,188,143,0.55);}
    70%{box-shadow:0 0 0 8px rgba(114,188,143,0);}
    100%{box-shadow:0 0 0 0 rgba(114,188,143,0);}
  }
​
  .logo{
    width:64px;height:64px;
    margin:0 auto 20px;
    border-radius:16px;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    display:flex;align-items:center;justify-content:center;
    font-size:32px;
    box-shadow:0 10px 30px rgba(94,159,232,0.35);
  }
​
  h1{
    font-size:24px;
    line-height:1.35;
    margin:0 0 10px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  h1 span{
    background:linear-gradient(90deg, #7FC1F5, #C9A6E8);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
​
  p.sub{
    font-size:15px;
    color:var(--text-soft);
    line-height:1.6;
    margin:0 0 28px;
  }
​
  .divider{
    height:1px;
    background:linear-gradient(90deg, transparent, var(--border), transparent);
    margin:0 0 24px;
  }
​
  .url-chip{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 16px;
    margin-bottom:22px;
    font-size:14px;
    color:var(--text-soft);
    word-break:break-all;
  }
  .url-chip strong{color:var(--text);font-weight:600;}
​
  .cta{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:15px 20px;
    border-radius:12px;
    background:linear-gradient(90deg, var(--accent), var(--accent-2));
    color:#fff;
    font-size:16px;
    font-weight:700;
    text-decoration:none;
    box-shadow:0 12px 28px rgba(94,159,232,0.32);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .cta:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(94,159,232,0.42);}
  .cta:active{transform:translateY(0);}
  .cta:focus-visible{outline:3px solid #fff;outline-offset:3px;}
​
  .meta{
    margin-top:20px;
    font-size:13px;
    color:var(--text-soft);
  }
  .meta b{color:var(--text);}
​
  .tags{
    margin-top:22px;
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .tag{
    font-size:12px;
    padding:5px 11px;
    border-radius:999px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    color:var(--text-soft);
  }
​
  @media (max-width:420px){
    .card{padding:32px 22px 26px;border-radius:16px;}
    h1{font-size:21px;}
  }
​
  @media (prefers-reduced-motion: reduce){
    .orb, .card, .badge .dot{animation:none;}
  }
</style>
</head>
<body>
  <div class="grid-overlay"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
​
  <main class="card">
    <span class="badge"><span class="dot"></span> Alamat baru aktif</span>
    <div class="logo">🎮</div>
    <h1>List Game <span>Link.yu</span><br>sudah pindah rumah!</h1>
    <p class="sub">Semua game, kategori, dan update terbaru sekarang ada di alamat baru. Yuk lanjut ke sana.</p>
​
    <div class="divider"></div>
​
    <div class="url-chip">
      <span><strong>listgame.my.id</strong></span>
      <span id="countdown">6s</span>
    </div>
​
    <a class="cta" href="https://www.listgame.my.id/" id="go">
      Kunjungi Sekarang →
    </a>
​
    <div class="meta">Otomatis dialihkan dalam <b><span id="countdown2">6</span> detik</b></div>
​
    <div class="tags">
      <span class="tag">🟢 Ringan</span>
      <span class="tag">🟡 Sedang</span>
      <span class="tag">🟠 Agak Berat</span>
      <span class="tag">🔴 Berat</span>
    </div>
  </main>
​
  <script>
    var n = 3;
    var c1 = document.getElementById('countdown');
    var c2 = document.getElementById('countdown2');
    var timer = setInterval(function () {
      n -= 1;
      if (n <= 0) {
        clearInterval(timer);
        window.location.href = 'https://www.listgame.my.id/';
        return;
      }
      if (c1) c1.textContent = n + 's';
      if (c2) c2.textContent = n;
    }, 1000);
  </script>
</body>
</html>
