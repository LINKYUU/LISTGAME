<script src="data_game.js"></script>

<script>

bomberman r', 'super smash bros', 'team sonic racing', 'tekken', 'tt isle of man', 'twisted metal', 'ufc', 'ultimate marvel vs capcom 3', 'ultra street fighter iv', 'unravel two', 'wrc', 'wreckfest', 'wwe'];
        const keywordsPerang = ['ace combat', 'assassin creed', 'battlefield', 'call of duty', 'cod ', 'commandos', 'company of heroes', 'crysis', 'dynasty warrior', 'far cry', 'gears of war', 'ghost recon', 'halo', 'homefront', 'medal of honor', 'metal gear', 'mount & blade', 'partisan', 'samurai warriors', 'sengoku basara', 'sniper elite', 'sniper ghost warrior', 'star wars battlefront', 'terminator resistance', 'tom clancy', 'total war', 'transformers', 'viking battle', 'warhammer', 'warriors orochi', 'wolfenstein', 'world war z'];
        const keywordsSport = ['ao international tennis', 'captain tsubasa', 'ea sports fc', 'efootball pes', 'pro evolution soccer', 'euro fishing', 'fifa', 'fight night', 'football manager', 'mario tennis', 'nba 2k', 'pes', 'session skateboarding', 'ufc', 'ultimate fishing', 'wwe 2k', 'wwe smackdown', 'wwe all stars', 'winning eleven'];
        const keywordsHorror = ['a plague tale', 'alan wake', 'amnesia', 'back 4 blood', 'days gone', 'dead island', 'dead rising', 'dead space', 'dreadout', 'dying light', 'ebola 2', 'fatal frame', 'five nights at freddys', 'gylt', 'hello neighbor', 'home sweet home', 'ibilis', 'indika', 'into the dead', 'left 4 dead', 'lies of p', 'little nightmares', 'nightmare side', 'outlast', 'pamali', 'poppy playtime', 'resident evil', 'september 7th', 'silent hill', 'sons of the forest', 'the bridge curse', 'the coffin of andy', 'the evil within', 'the forest', 'the last of us', 'the walking dead', 'until dawn', 'zombie army'];
        const keywordsStrategi = ['age of empires', 'age of mythology', 'age of wonders', 'aircraft carrier', 'automaton', 'bakery shop', 'battle realms', 'bloons td', 'brigandine', 'builder simulator', 'bus simulator', 'red alert 3', 'cities skylines', 'city bus manager', 'command and conquer', 'company of heroes', 'cooking simulator', 'europa universalis', 'farm manager', 'farming simulator', 'frostpunk', 'gas station', 'hearts of iron', 'house builder', 'house flipper', 'humankind', 'internet cafe', 'jurassic world', 'manor lords', 'medieval dynasty', 'might and magic', 'motel manager', 'northgard', 'oxygen not included', 'pc building', 'planet coaster', 'planet zoo', 'police simulator', 'praetorians', 'prison simulator', 'ranch simulator', 'red alert 4', 'rollercoaster tycoon', 'simcity', 'stronghold', 'tropico', 'two point campus', 'two point hospital', 'warcraft iii'];
        const keywordsBalap = ['american truck', 'assetto corsa', 'beach buggy', 'beamng', 'blur', 'burnout paradise', 'car mechanic', 'cars 2', 'carx street', 'chocobo gp', 'ctr yuzu', 'dakar desert rally', 'dirt', 'driver san francisco', 'euro truck', 'expeditions', 'f1 20', 'f1 race stars', 'forza horizon', 'gran turismo', 'grid', 'hot wheels', 'jdm japanese', 'juiced 2', 'le mans', 'lego 2k drive', 'mario kart', 'motogp', 'mx vs atv', 'mxgp', 'nascar', 'need for speed', 'nfs', 'nickelodeon kart', 'pacific drive', 'ride 2', 'ride 4', 'rims racing', 'sbk 22', 'snowrunner', 'sonic & all stars', 'splitsecond', 'taxi life', 'team sonic racing', 'tt isle of man', 'wrc', 'wreckfest'];

        if (keywordsMainBerdua.some(k => n.includes(k))) g.push('Main Berdua');
        if (keywordsPerang.some(k => n.includes(k))) g.push('Perang');
        if (keywordsSport.some(k => n.includes(k))) g.push('Sport');
        if (keywordsHorror.some(k => n.includes(k))) g.push('Horror');
        if (keywordsStrategi.some(k => n.includes(k))) g.push('Strategi');
        if (keywordsBalap.some(k => n.includes(k))) g.push('Balap');
        return [...new Set(g)].length === 0 ? ['Lainnya'] : [...new Set(g)];
    }

    function parseSizeToMB(s) {
        const p = s.split(' '); if (p.length < 2) return 0;
        const v = parseFloat(p[0]); const u = p[1].toLowerCase();
        if (u === 'gb') return v * 1024; if (u === 'mb') return v; return 0;
    }

    function parseData() {
        if (typeof csvData === 'undefined') return;
        const lines = csvData.split('\n');
        const map = new Map();
        let started = false;
        for (const l of lines) {
            if (l.startsWith('NAMA GAME,SIZE,KETERANGAN')) { started = true; continue; }
            if (!started || l.trim() === '') continue;
            const p = l.split(',');
            if (p.length >= 3) {
                const name = p[0].replace(/"/g, '').trim();
                const size = p[1].trim();
                const desc = p[2].trim();
                if (name && !name.includes('.mp4')) {
                    const game = { name, size, description: desc, sizeVal: parseSizeToMB(size), genre: getGameGenres(name) };
                    if (!map.has(name) || game.sizeVal > map.get(name).sizeVal) map.set(name, game);
                }
            }
        }
        allGames = Array.from(map.values());
    }

    function formatReqText(text, kategori) {
        if (!text) return "";
        let cleanText = text.split(/Recommended:|Recommended Requirements:/gi)[0];
        cleanText = cleanText.replace(/[®™]/g, '');

        if ((kategori.includes("berat") || kategori.includes("sedang")) && 
            (cleanText.includes("Dual Core") || cleanText.includes("2 GB RAM"))) {
            return ""; 
        }

        let labels = ["Processor:", "Memory:", "Graphics:", "OS:"];
        let formattedLines = [];

        labels.forEach(label => {
            if (cleanText.includes(label)) {
                let start = cleanText.indexOf(label) + label.length;
                let temp = cleanText.substring(start);
                let endIdx = temp.search(/Memory:|Graphics:|OS:|DirectX:|Storage:|Sound Card:|Additional Notes:|Notes:|<br>/i);
                let data = (endIdx !== -1) ? temp.substring(0, endIdx) : temp;

                data = data.trim();
                if (label !== "Graphics:") data = data.replace(/\s?\([^)]*\)/g, ''); 
                data = data.replace(/available space|minimum requirements|Home 64 Bit/gi, '').trim();
                
                if (label === "Processor:" || label === "Graphics:") {
                    if (data.includes(" / ") || data.includes(" or ")) {
                        let parts = data.split(/ \/ | or /);
                        if (parts.length >= 2) data = parts[0].trim() + " / " + parts[1].trim();
                    }
                } else {
                    if (data.includes(" / ")) data = data.split(" / ")[0].trim();
                }

                if (data && data.toUpperCase() !== "TBA") {
                    let displayLabel = label === "Memory:" ? "Memory / Ram:" : label;
                    if(label === "OS:") displayLabel = "Windows:";
                    formattedLines.push(`<b>${displayLabel}</b> ${data}`);
                }
            }
        });

        if (formattedLines.length < 2) return ""; 
        return "<strong>Minimum Requirements:</strong><br>" + formattedLines.join("<br>");
    }

    async function showSpec(gameName) {
        const modal = document.getElementById('specModal');
        const title = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        const coverImg = document.getElementById('gameCover');
        const localGame = allGames.find(g => g.name === gameName);
        const kategori = localGame ? localGame.description.toLowerCase() : "";

        title.textContent = gameName;
        body.innerHTML = "Sabar Om Lagi Loading...";
        coverImg.src = ""; 
        modal.style.display = "block";

        try {
            const searchRes = await fetch(`https://api.rawg.io/api/games?key=${apiKey}&search=${encodeURIComponent(gameName)}&page_size=1`);
            const searchData = await searchRes.json();
            
            if (searchData.results.length) {
                const res = searchData.results[0];
                coverImg.src = res.background_image || "";

                const gameKey = gameName.toLowerCase();
                if (manualCorrections[gameKey]) {
                    const m = manualCorrections[gameKey];
                    body.innerHTML = `<div class="req-text"><strong>Minimum Requirements:</strong><br><b>Processor:</b> ${m.processor}<br><b>Memory / Ram:</b> ${m.memory}<br><b>Graphics:</b> ${m.graphics}<br><b>Windows:</b> ${m.windows}</div>`;
                    return;
                }

                const detailRes = await fetch(`https://api.rawg.io/api/games/${res.id}?key=${apiKey}`);
                const detailData = await detailRes.json();
                const pcPlatform = detailData.platforms.find(p => p.platform.id === 4);
                
                if (pcPlatform && pcPlatform.requirements && pcPlatform.requirements.minimum) {
                    let minReq = formatReqText(pcPlatform.requirements.minimum, kategori);
                    if (minReq === "") { showFallbackSpec(body, kategori); } 
                    else { body.innerHTML = `<div class="req-text">${minReq}</div>`; }
                } else {
                    showFallbackSpec(body, kategori);
                }
            } else {
                showFallbackSpec(body, kategori);
            }
        } catch (e) {
            showFallbackSpec(body, kategori);
        }
    }

    function showFallbackSpec(element, kategori) {
        let content = "";
        let color = "#f0ad4e"; 
        if (kategori.includes("ringan")) {
            color = "#28a745"; 
            content = `<b>Processor:</b> Core 2 Quad / AMD Phenom<br><b>Memory / Ram:</b> 4 GB RAM<br><b>Graphics:</b> GT 730 / HD 7730<br><b>Windows:</b> 7/8/10`;
        } else if (kategori.includes("sedang")) {
            color = "#007bff"; 
            content = `<b>Processor:</b> Intel Core i3-4130 / AMD Ryzen 3 1200<br><b>Memory / Ram:</b> 8 GB RAM<br><b>Graphics:</b> GTX 750 Ti / AMD R9 270<br><b>Windows:</b> 10`;
        } else if (kategori.includes("agak berat")) {
            color = "#fd7e14"; 
            content = `<b>Processor:</b> Intel Core i5-6400 / AMD Ryzen 5 1600<br><b>Memory / Ram:</b> 8 GB RAM<br><b>Graphics:</b> GTX 1050 / AMD RX 560<br><b>Windows:</b> 10`;
        } else if (kategori.includes("berat")) {
            color = "#dc3545"; 
            content = `<b>Processor:</b> Intel Core i7-8700 / AMD Ryzen 7 2700<br><b>Memory / Ram:</b> 16 GB RAM<br><b>Graphics:</b> GTX 1660 / AMD RX 580<br><b>Windows:</b> 10/11`;
        } else {
            content = `<b>Processor:</b> Intel Core i5 / AMD Ryzen 5<br><b>Memory / Ram:</b> 8 GB RAM<br><b>Graphics:</b> NVIDIA GTX 1050<br><b>Windows:</b> 10`;
        }
        element.innerHTML = `<div class="req-text" style="border-left-color: ${color};"><strong style="display:block; margin-bottom:5px; color:${color};">Minimum Requirements:</strong>${content}</div>`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        const tableBody = document.getElementById('gameListBody');
        const searchInput = document.getElementById('searchInput');
        const count = document.getElementById('gameCount');
        const modal = document.getElementById('specModal');
        parseData();

        function render(list) {
            tableBody.innerHTML = '';
            list.forEach(g => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><span class="clickable-name" onclick="showSpec('${g.name}')">${g.name}</span></td><td>${g.size}</td><td class="ket-${g.description.toLowerCase().replace(' ', '-')}">${g.description}</td>`;
                tableBody.appendChild(tr);
            });
            count.textContent = `Menampilkan ${list.length} dari ${allGames.length} game`;
        }

        function filter() {
            const term = searchInput.value.toLowerCase();
            let games = [...allGames];
            if (term) games = games.filter(g => g.name.toLowerCase().includes(term));
            if (currentCategoryFilter) games = games.filter(g => g.description.toLowerCase() === currentCategoryFilter.toLowerCase());
            if (currentGenreFilter) games = games.filter(g => g.genre.includes(currentGenreFilter));
            render(games);
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                if (btn.classList.contains('active')) { btn.classList.remove('active'); currentCategoryFilter = null;
                } else { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentCategoryFilter = btn.dataset.filter; }
                filter();
            };
        });

        document.querySelectorAll('.genre-btn').forEach(btn => {
            btn.onclick = () => {
                if (btn.classList.contains('active')) { btn.classList.remove('active'); currentGenreFilter = null;
                } else { document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentGenreFilter = btn.dataset.filter; }
                filter();
            };
        });

        searchInput.onkeyup = filter;
        document.querySelector('.close-btn').onclick = () => modal.style.display = "none";
        window.onclick = (e) => { if(e.target == modal) modal.style.display = "none"; };
        render(allGames);
    });
</script>
