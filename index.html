<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Game Link.Yu - Navy Theme</title>
    <style>
        /* TEMA NAVY PREMIUM */
        :root {
            --bg-dark: #0a192f;
            --bg-card: #112240;
            --accent: #007bff;
            --text-main: #e6f1ff;
            --text-dim: #8892b0;
            --white: #ffffff;
            --danger: #d9534f;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        header { 
            padding: 25px; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(to bottom, #112240, #0a192f);
        }

        .special-notice {
            background: rgba(217, 83, 79, 0.1);
            border: 1px solid var(--danger);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .special-notice p { margin: 5px 0; font-weight: 600; color: #ff6b6b; }
        .special-notice p.whatsapp { color: var(--text-main); font-size: 15px; }
        .special-notice p.shopee-link a { color: #4da3ff; text-decoration: none; border-bottom: 1px solid; }

        h1 { text-align: center; color: var(--white); margin: 0; font-size: 24px; }

        #searchInput {
            width: 100%; padding: 12px; margin-top: 20px;
            font-size: 16px; border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 8px; box-sizing: border-box;
            background-color: var(--bg-dark); color: white;
        }

        #filterContainer, #genreFilterContainer {
            margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
        }

        .filter-btn, .genre-btn {
            padding: 8px 15px; font-size: 13px; font-weight: 600; 
            background-color: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; 
            cursor: pointer; color: var(--text-dim); transition: 0.3s;
        }

        /* Tombol Aktif */
        .filter-btn.active[data-filter="Ringan"] { background: #28a745; color: white; border-color: #28a745; }
        .filter-btn.active[data-filter="Sedang"] { background: #007bff; color: white; border-color: #007bff; }
        .filter-btn.active[data-filter="Agak Berat"] { background: #fd7e14; color: white; border-color: #fd7e14; }
        .filter-btn.active[data-filter="Berat"] { background: #dc3545; color: white; border-color: #dc3545; }
        .genre-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .instruction-text {
            text-align: center; margin: 15px 0; font-weight: bold; 
            color: #ffda79; font-size: 13px; animation: blink 1.5s linear infinite;
        }
        @keyframes blink { 50% { opacity: 0.5; } }

        .table-wrapper { max-height: 55vh; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.1); }
        #gameTable { width: 100%; border-collapse: collapse; }
        #gameTable th { 
            background-color: #0d1b33; color: var(--accent); padding: 12px; 
            position: sticky; top: 0; z-index: 10; text-align: left; font-size: 13px;
        }
        #gameTable td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        
        .clickable-name { color: #4da3ff; cursor: pointer; font-weight: 500; }
        .clickable-name:hover { color: white; text-decoration: underline; }

        /* Kategori Warna */
        .ket-ringan { color: #2ecc71; font-weight: bold; }
        .ket-sedang { color: #3498db; font-weight: bold; }
        .ket-agak-berat { color: #e67e22; font-weight: bold; }
        .ket-berat { color: #e74c3c; font-weight: bold; }

        /* Modal */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(10, 25, 47, 0.85); backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--bg-card); margin: 15% auto; padding: 25px; width: 85%; max-width: 450px;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); color: white;
        }
        .close-btn { float: right; font-size: 28px; cursor: pointer; color: var(--text-dim); }

        .req-text { 
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; 
            border-left: 4px solid var(--accent); font-size: 13px; line-height: 1.6;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #233554; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="special-notice">
            <p>🎮 DAFTAR GAME LINK.YU 🎮</p>
            <p class="whatsapp">💬 WA: 08 777 26 77776</p>
            <p class="shopee-link">🛒 Shopee: <a href="https://id.shp.ee/QiepRVW" target="_blank">Klik Disini</a></p>
        </div>
        <h1>Daftar Game</h1>
        <input type="text" id="searchInput" placeholder="Cari judul game...">
        
        <div id="filterContainer">
            <button class="filter-btn" data-filter="Ringan">Ringan</button>
            <button class="filter-btn" data-filter="Sedang">Sedang</button>
            <button class="filter-btn" data-filter="Agak Berat">Agak Berat</button>
            <button class="filter-btn" data-filter="Berat">Berat</button>
        </div>
        
        <div id="genreFilterContainer">
            <button class="genre-btn" data-filter="Main Berdua">Main Berdua</button>
            <button class="genre-btn" data-filter="Perang">Perang</button>
            <button class="genre-btn" data-filter="Sport">Sport</button>
            <button class="genre-btn" data-filter="Horror">Horror</button>
            <button class="genre-btn" data-filter="Strategi">Strategi</button>
            <button class="genre-btn" data-filter="Balap">Balap</button>
        </div>

        <div class="instruction-text">TEKAN JUDUL UNTUK DETAIL SPEK</div>
        <div id="gameCount" style="text-align:center; color: var(--text-dim); font-size:12px;"></div>
    </header>
    
    <div class="table-wrapper">
        <table id="gameTable">
            <thead>
                <tr>
                    <th style="width:50%">Nama Game</th>
                    <th>Size</th>
                    <th>Speck</th>
                </tr>
            </thead>
            <tbody id="gameListBody"></tbody>
        </table>
    </div>
</div>

<div id="specModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h3 id="modalTitle" style="margin-top:0; color: #4da3ff;">Memuat...</h3>
        <div id="modalBody">Sabar Om...</div>
    </div>
</div>

<script>
    /* MASUKKAN DATA CSV KAMU DI SINI 
       Ganti teks di bawah dengan isi file data_game.js kamu
    */
    const csvData = `NAMA GAME,SIZE,KETERANGAN
"GTA V",60 GB,Berat
"Winning Eleven 9",1 GB,Ringan
"Resident Evil 4",4 GB,Sedang
"Bully",3 GB,Ringan
"Spider-Man Miles Morales",40 GB,Berat`; 

    const apiKey = "158b3858daed4d67af02a839d14ba445";
    let allGames = [];
    let currentCategoryFilter = null;
    let currentGenreFilter = null;

    // Logika Pengenalan Genre
    function getGameGenres(gameName) {
        const n = gameName.toLowerCase();
        const g = [];
        if (['fifa','pes','winning','nba','tsubasa','wwe'].some(k => n.includes(k))) g.push('Sport');
        if (['cod','battlefield','war','sniper','medal'].some(k => n.includes(k))) g.push('Perang');
        if (['resident','horror','silent','outlast'].some(k => n.includes(k))) g.push('Horror');
        if (['nfs','forza','dirt','gt','balap','moto'].some(k => n.includes(k))) g.push('Balap');
        if (['berdua','coop','split'].some(k => n.includes(k))) g.push('Main Berdua');
        return g.length ? g : ['Lainnya'];
    }

    function parseData() {
        const lines = csvData.split('\n');
        let started = false;
        const map = new Map();
        for (const l of lines) {
            if (l.includes('NAMA GAME,SIZE,KETERANGAN')) { started = true; continue; }
            if (!started || l.trim() === '') continue;
            const p = l.split(',');
            if (p.length >= 3) {
                const name = p[0].replace(/"/g, '').trim();
                const size = p[1].trim();
                const desc = p[2].trim();
                if (name) {
                    map.set(name, { name, size, description: desc, genre: getGameGenres(name) });
                }
            }
        }
        allGames = Array.from(map.values());
    }

    async function showSpec(gameName) {
        const modal = document.getElementById('specModal');
        const title = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        const game = allGames.find(g => g.name === gameName);

        title.textContent = gameName;
        body.innerHTML = "Mencari data...";
        modal.style.display = "block";

        try {
            const res = await fetch(`https://api.rawg.io/api/games?key=${apiKey}&search=${encodeURIComponent(gameName)}&page_size=1`);
            const data = await res.json();
            if (data.results.length) {
                const detailRes = await fetch(`https://api.rawg.io/api/games/${data.results[0].id}?key=${apiKey}`);
                const detail = await detailRes.json();
                const pc = detail.platforms.find(p => p.platform.id === 4);
                if (pc && pc.requirements && pc.requirements.minimum) {
                    body.innerHTML = `<div class="req-text">${pc.requirements.minimum}</div>`;
                    return;
                }
            }
            body.innerHTML = `<div class="req-text">Spek Minimum: Sesuai kategori <b>${game.description}</b>.</div>`;
        } catch (e) {
            body.innerHTML = "Gagal memuat data.";
        }
    }

    function render(list) {
        const tableBody = document.getElementById('gameListBody');
        tableBody.innerHTML = '';
        list.forEach(g => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="clickable-name" onclick="showSpec('${g.name}')">${g.name}</span></td>
                <td>${g.size}</td>
                <td class="ket-${g.description.toLowerCase().replace(/\s+/g, '-')}">${g.description}</td>
            `;
            tableBody.appendChild(tr);
        });
        document.getElementById('gameCount').textContent = `Menampilkan ${list.length} game`;
    }

    function filter() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        let filtered = allGames.filter(g => {
            const matchSearch = g.name.toLowerCase().includes(term);
            const matchCat = !currentCategoryFilter || g.description === currentCategoryFilter;
            const matchGenre = !currentGenreFilter || g.genre.includes(currentGenreFilter);
            return matchSearch && matchCat && matchGenre;
        });
        render(filtered);
    }

    document.addEventListener('DOMContentLoaded', () => {
        parseData();
        render(allGames);

        document.getElementById('searchInput').onkeyup = filter;
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                btn.classList.toggle('active');
                currentCategoryFilter = btn.classList.contains('active') ? btn.dataset.filter : null;
                document.querySelectorAll('.filter-btn').forEach(b => { if(b !== btn) b.classList.remove('active')});
                filter();
            };
        });

        document.querySelectorAll('.genre-btn').forEach(btn => {
            btn.onclick = () => {
                btn.classList.toggle('active');
                currentGenreFilter = btn.classList.contains('active') ? btn.dataset.filter : null;
                document.querySelectorAll('.genre-btn').forEach(b => { if(b !== btn) b.classList.remove('active')});
                filter();
            };
        });

        document.querySelector('.close-btn').onclick = () => document.getElementById('specModal').style.display = "none";
        window.onclick = (e) => { if(e.target.className === 'modal') document.getElementById('specModal').style.display = "none"; };
    });
</script>
</body>
</html>
