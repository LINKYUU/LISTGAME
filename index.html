<head>

    <style>
        body {

        h1 { text-align: center; color: #1a1a1a; margin: 10px 0 0 0; }

            width: 100%; padding: 12px 15px; margin-top: 15px;

        #filterContainer, #genreFilterContainer {

        #genreFilterContainer { padding-top: 10px; border-top: 1px dashed #ccc; }
        
        .filter-btn, .genre-btn {

        .filter-btn.active[data-filter="Ringan"] { background-color: #28a745; color: white; }
        .filter-btn.active[data-filter="Sedang"] { background-color: #007bff; color: white; }
        .filter-btn.active[data-filter="Agak Berat"] { background-color: #fd7e14; color: white; }
        .filter-btn.active[data-filter="Berat"] { background-color: #dc3545; color: white; }

        .table-wrapper { max-height: 60vh; overflow-y: auto; border-top: 1px solid #e0e0e0; }

        #gameTable th, #gameTable td { padding: 12px 15px; border-bottom: 1px solid #e0e0e0; text-align: left; }

        .clickable-name { color: #0056b3; cursor: pointer; text-decoration: underline; font-weight: 500; }

        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(3px);
        }
        .modal-content {
            background: white; margin: 10% auto; padding: 20px; width: 90%; max-width: 500px;
            border-radius: 12px; position: relative; max-height: 70vh; overflow-y: auto;
        }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; color: #999; }
        
        .req-text { 
            background: #f9f9f9; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 13px; 
            line-height: 1.4; 
            border-left: 4px solid #1a73e8;
            word-wrap: break-word;
        }

        .ket-ringan { color: #28a745; font-weight: 600; }
        .ket-sedang { color: #007bff; font-weight: 600; }
        .ket-agak-berat { color: #fd7e14; font-weight: 600; }
        .ket-berat { color: #dc3545; font-weight: 600; }

        .instruction-text {
            text-align: center; 
            margin: 15px 0 5px 0; 
            font-weight: bold; 
            color: #d9534f; 
            font-size: 18px;
            animation: blink 1.5s linear infinite;
        }
        @keyframes blink { 50% { opacity: 0.6; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="special-notice">
            <p>🎮 DAFTAR GAME LINK.YU 🎮</p>
            <p class="whatsapp">💬 WA: 08 777 26 77776</p>
            <p class="shopee-link">🛒 Shopee: <a href="https://id.shp.ee/QiepRVW" target="_blank">Klik Disini</a></p>
        </div>

        <h1>Daftar Game</h1>
        <input type="text" id="searchInput" placeholder="Cari game...">
        
        <div id="filterContainer">
            <button class="filter-btn" data-filter="Ringan">Ringan</button>
            <button class="filter-btn" data-filter="Sedang">Sedang</button>

            <button class="genre-btn" data-filter="Horror">Horror</button>

        </div>

    </header>
    
    <div class="table-wrapper">
        <table id="gameTable">
            <thead>
                <tr>
                    <th style="width:50%">Nama Game</th>
                    <th id="sizeHeader" style="cursor: pointer;">Size ↕</th>
                    <th>Speck</th>
                </tr>
            </thead>
            <tbody id="gameListBody"></tbody>
        </table>
    </div>
</div>

<div id="specModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h3 id="modalTitle" style="margin-top:0;">Memuat...</h3>
        <div id="modalBody">Tunggu Bentar Om Lagi Loading...</div>
    </div>
</div>

<script src="data_game.js"></script>

<script>
    const apiKey = "158b3858daed4d67af02a839d14ba445";

    let allGames = [];
    let currentCategoryFilter = null;
    let currentGenreFilter = null;

    // --- KEYWORDS GENRE ---
    const keywordsMainBerdua = ['pico park', 'a way out', 'ao international tennis', 'attack on titan 2', 'baldurs gate 3', 'basara 2', 'basara 3', 'battletoads', 'beach buggy racing 2', 'beyond two souls', 'bloons td 6', 'blur', 'borderlands 2', 'borderlands 3', 'brothers a tale of two sons', 'call of duty black ops iii', 'captain tsubasa', 'cars 2', 'chained together', 'chocobo gp', 'crash bandicoot 4', 'ctr yuzu', 'cult of the lamb', 'cuphead', 'def jam vendetta', 'demon slayer', 'dirt 3', 'dirt 5', 'donkey kong country', 'downhill domination', 'dragon ball fighterz', 'dragon ball xenoverse', 'sparking! zero', 'dynasty warrior', 'ea sports fc', 'efootball pes', 'pro evolution soccer', 'f1 20', 'f1 race stars', 'fifa', 'fita street', 'fight night', 'gears of war', 'gears of war 4', 'goat simulator 3', 'gran turismo 4', 'guilty gear strive', 'guitar hero', 'halo the master chief collection', 'hot wheels unleashed', 'human fall flat', 'hyrule warriors', 'jujutsu kaisen', 'jump force', 'kamen rider', 'kirby and the forgotten land', 'kirby star allies', "kirby's return to dream land", 'left 4 dead 2', 'lego', 'luigi mansion 3', "luigi's mansion 2", 'mario kart 8', 'mario sonic at the', 'mario tennis', 'marvel ultimate alliance', 'melty blood', 'minecraft dungeons', 'mortal kombat', 'motogp', 'moving out', 'my hero ones justice 2', 'naruto', 'nascar', 'nba 2k', 'nickelodeon all star brawl', 'nickelodeon kart racers', 'one piece burning blood', 'one piece pirate warriors', 'one punch man', 'overcooked 2', 'persona 4 arena', "pokemon let's go", 'pokkén tournament', 'power rangers battle for the grid', 'rayman legends', 'resident evil 5', 'resident evil 6', 'resident evil revelations 2', 'river city girls 2', 'rocket league', 'saint seiya soldiers soul', 'samurai warriors', 'sbk 22', 'sengoku basara', 'shieldwall', 'sonic & all stars', 'sonic superstar', 'spider man friend or foe', 'splitsecond', 'street fighter v', 'streets of rage 4', 'stronghold crusader', 'super bomberman r', 'super smash bros', 'team sonic racing', 'tekken', 'tt isle of man', 'twisted metal', 'ufc', 'ultimate marvel vs capcom 3', 'ultra street fighter iv', 'unravel two', 'wrc', 'wreckfest', 'wwe'];
    const keywordsPerang = ['ace combat', 'assassin creed', 'battlefield', 'call of duty', 'cod ', 'commandos', 'company of heroes', 'crysis', 'dynasty warrior', 'far cry', 'gears of war', 'ghost recon', 'halo', 'homefront', 'medal of honor', 'metal gear', 'mount & blade', 'partisan', 'samurai warriors', 'sengoku basara', 'sniper elite', 'sniper ghost warrior', 'star wars battlefront', 'terminator resistance', 'tom clancy', 'total war', 'transformers', 'viking battle', 'warhammer', 'warriors orochi', 'wolfenstein', 'world war z'];
    const keywordsSport = ['ao international tennis', 'captain tsubasa', 'ea sports fc', 'efootball pes', 'pro evolution soccer', 'euro fishing', 'fifa', 'fight night', 'football manager', 'mario tennis', 'nba 2k', 'pes', 'session skateboarding', 'ufc', 'ultimate fishing', 'wwe 2k', 'wwe smackdown', 'wwe all stars', 'winning eleven'];
    const keywordsHorror = ['a plague tale', 'alan wake', 'amnesia', 'back 4 blood', 'days gone', 'dead island', 'dead rising', 'dead space', 'dreadout', 'dying light', 'ebola 2', 'fatal frame', 'five nights at freddys', 'gylt', 'hello neighbor', 'home sweet home', 'ibilis', 'indika', 'into the dead', 'left 4 dead', 'lies of p', 'little nightmares', 'nightmare side', 'outlast', 'pamali', 'poppy playtime', 'resident evil', 'september 7th', 'silent hill', 'sons of the forest', 'the bridge curse', 'the coffin of andy', 'the evil within', 'the forest', 'the last of us', 'the walking dead', 'until dawn', 'zombie army'];
    const keywordsStrategi = ['age of empires', 'age of mythology', 'age of wonders', 'aircraft carrier', 'automaton', 'bakery shop', 'battle realms', 'bloons td', 'brigandine', 'builder simulator', 'bus simulator', 'red alert 3', 'cities skylines', 'city bus manager', 'command and conquer', 'company of heroes', 'cooking simulator', 'europa universalis', 'farm manager', 'farming simulator', 'frostpunk', 'gas station', 'hearts of iron', 'house builder', 'house flipper', 'humankind', 'internet cafe', 'jurassic world', 'manor lords', 'medieval dynasty', 'might and magic', 'motel manager', 'northgard', 'oxygen not included', 'pc building', 'planet coaster', 'planet zoo', 'police simulator', 'praetorians', 'prison simulator', 'ranch simulator', 'red alert 4', 'rollercoaster tycoon', 'simcity', 'stronghold', 'tropico', 'two point campus', 'two point hospital', 'warcraft iii'];
    const keywordsBalap = ['american truck', 'assetto corsa', 'beach buggy', 'beamng', 'blur', 'burnout paradise', 'car mechanic', 'cars 2', 'carx street', 'chocobo gp', 'ctr yuzu', 'dakar desert rally', 'dirt', 'driver san francisco', 'euro truck', 'expeditions', 'f1 20', 'f1 race stars', 'forza horizon', 'gran turismo', 'grid', 'hot wheels', 'jdm japanese', 'juiced 2', 'le mans', 'lego 2k drive', 'mario kart', 'motogp', 'mx vs atv', 'mxgp', 'nascar', 'need for speed', 'nfs', 'nickelodeon kart', 'pacific drive', 'ride 2', 'ride 4', 'rims racing', 'sbk 22', 'snowrunner', 'sonic & all stars', 'splitsecond', 'taxi life', 'team sonic racing', 'tt isle of man', 'wrc', 'wreckfest'];

    function getGameGenres(gameName) {
        const n = gameName.toLowerCase();
        const g = [];
        if (keywordsMainBerdua.some(k => n.includes(k))) g.push('Main Berdua');
        if (keywordsPerang.some(k => n.includes(k))) g.push('Perang');
        if (keywordsSport.some(k => n.includes(k))) g.push('Sport');
        if (keywordsHorror.some(k => n.includes(k))) g.push('Horror');
        if (keywordsStrategi.some(k => n.includes(k))) g.push('Strategi');
        if (keywordsBalap.some(k => n.includes(k))) g.push('Balap');
        return g.length === 0 ? ['Lainnya'] : g;
    }

    function parseSizeToMB(s) {
        const p = s.split(' '); if (p.length < 2) return 0;
        const v = parseFloat(p[0]); const u = p[1].toLowerCase();
        if (u === 'gb') return v * 1024; if (u === 'mb') return v; return 0;
    }

    function parseData() {
        if (typeof csvData === 'undefined') return;
        const lines = csvData.split('\n');
        const map = new Map();
        let started = false;
        for (const l of lines) {
            if (l.startsWith('NAMA GAME,SIZE,KETERANGAN')) { started = true; continue; }
            if (!started || l.trim() === '') continue;
            const p = l.split(',');
            if (p.length >= 3) {
                const name = p[0].replace(/"/g, '').trim();
                const size = p[1].trim();
                const desc = p[2].trim();
                if (name && !name.includes('.mp4')) {
                    const game = { name, size, description: desc, sizeVal: parseSizeToMB(size), genre: getGameGenres(name) };
                    if (!map.has(name) || game.sizeVal > map.get(name).sizeVal) map.set(name, game);
                }
            }
        }
        allGames = Array.from(map.values());
    }

    // --- FUNGSI FORMATTING TEKS RAWG AGAR RAPI BERBARIS ---
    function formatReqText(text) {
        if (!text) return "";
        // Hanya ambil bagian Minimum, bagian Recommended dibuang lewat regex
        let cleanText = text.split(/Recommended:|Recommended Requirements:/gi)[0];

        return cleanText
            .replace(/Minimum:|Minimum Requirements:/gi, "<strong>Minimum Requirements:</strong><br>")
            .replace(/OS:/g, "<br><b>OS:</b>")
            .replace(/Processor:/g, "<br><b>Processor:</b>")
            .replace(/Memory:/g, "<br><b>Memory:</b>")
            .replace(/Graphics:/g, "<br><b>Graphics:</b>")
            .replace(/DirectX:/g, "<br><b>DirectX:</b>")
            .replace(/Storage:/g, "<br><b>Storage:</b>")
            .replace(/Sound Card:/g, "<br><b>Sound Card:</b>")
            .replace(/^<br>/, ""); 
    }

    async function showSpec(gameName) {
        const modal = document.getElementById('specModal');
        const title = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        const localGame = allGames.find(g => g.name === gameName);
        const kategori = localGame ? localGame.description.toLowerCase() : "";

        title.textContent = gameName;
        body.innerHTML = "Tunggu Bentar Om Lagi Loading...";
        modal.style.display = "block";

        try {
            const searchRes = await fetch(`https://api.rawg.io/api/games?key=${apiKey}&search=${encodeURIComponent(gameName)}&page_size=1`);
            const searchData = await searchRes.json();
            if (!searchData.results.length) { showFallbackSpec(body, kategori); return; }

            const detailRes = await fetch(`https://api.rawg.io/api/games/${searchData.results[0].id}?key=${apiKey}`);
            const detailData = await detailRes.json();
            const pcPlatform = detailData.platforms.find(p => p.platform.id === 4);
            
            if (pcPlatform && pcPlatform.requirements && pcPlatform.requirements.minimum) {
                let minReq = formatReqText(pcPlatform.requirements.minimum);
                body.innerHTML = `<div class="req-text">${minReq}</div>`;
            } else {
                showFallbackSpec(body, kategori);
            }
        } catch (e) {
            showFallbackSpec(body, kategori);
        }
    }

    function showFallbackSpec(element, kategori) {
        let content = "";
        let color = "#f0ad4e"; 
        if (kategori.includes("ringan")) {
            color = "#28a745"; 
            content = `<b>CPU:</b> Intel Core 2 Quad Q6600 @ 2.40GHz / AMD Phenom 9850 @ 2.5GHz<br><b>CPU SPEED:</b> Info | <b>RAM:</b> 4 GB<br><b>VIDEO CARD:</b> NVIDIA 9800 GT 1GB / AMD HD 4870 1GB<br><b>DEDICATED VIDEO RAM:</b> 1 GB<br><b>SHADERS:</b> Pixel 4.0 / Vertex 4.0<br><b>OS:</b> Windows 7/8/10 (64 Bit)<br><b>SOUND:</b> DirectX 10 compatible`;
        } else if (kategori.includes("sedang")) {
            color = "#007bff"; 
            content = `<b>CPU:</b> Intel i3-5500k (3.3 GHz) / AMD Ryzen 3 1200 (3.1 GHz)<br><b>RAM:</b> 6 GB<br><b>VIDEO CARD:</b> NVIDIA GTX 960 (4 GB) / AMD R9 290X (4 GB)<br><b>DEDICATED VIDEO RAM:</b> 4 GB<br><b>SHADERS:</b> Pixel 5.1 / Vertex 5.1<br><b>OS:</b> Windows 10 64-bit<br><b>FREE DISK SPACE:</b> 70 GB`;
        } else if (kategori.includes("agak berat")) {
            color = "#fd7e14"; 
            content = `<b>CPU:</b> Intel i5-7600k (3.5 GHz) / AMD Ryzen 5 2400 G (3.6 GHz)<br><b>RAM:</b> 8 GB<br><b>VIDEO CARD:</b> NVIDIA GTX 1060 (6 GB) / AMD RX 570 (4 GB)<br><b>DEDICATED VIDEO RAM:</b> 6 GB (AMD 4GB)<br><b>SHADERS:</b> Pixel 5.1 / Vertex 5.1<br><b>OS:</b> Windows 10 64-bit<br><b>FREE DISK SPACE:</b> 70 GB`;
        } else if (kategori.includes("berat")) {
            color = "#dc3545"; 
            content = `<b>CPU:</b> Intel Core i7-9700 / AMD Ryzen 5 5500<br><b>RAM:</b> 16 GB<br><b>VIDEO CARD:</b> NVIDIA RTX 2060 / AMD RX 5700 XT<br><b>DEDICATED VIDEO RAM:</b> 8 GB (6GB NVD)<br><b>SHADERS:</b> Pixel 6.0 / Vertex 6.0<br><b>OS:</b> Windows 10 64-bit<br><b>DISK:</b> 130 GB | <b>SOUND:</b> Windows Compatible Audio`;
        } else {
            content = `<b>CPU:</b> Intel i5 / AMD Ryzen 5<br><b>RAM:</b> 8 GB<br><b>GPU:</b> GTX 1080 4GB<br><b>OS:</b> Windows 10 64-bit`;
        }
        element.innerHTML = `<div class="req-text" style="border-left-color: ${color}; line-height: 1.2; font-size: 13px; padding: 12px; background: #fafafa;"><strong style="display:block; margin-bottom:5px; color:${color};">Minimum Requirements:</strong>${content}</div><p style="font-size: 10px; color: #999; margin-top: 10px;">*Menampilkan spek berdasarkan kategori Link.Yu (Data RAWG kosong).</p>`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        const tableBody = document.getElementById('gameListBody');
        const searchInput = document.getElementById('searchInput');
        const count = document.getElementById('gameCount');
        const modal = document.getElementById('specModal');
        parseData();

        function render(list) {
            tableBody.innerHTML = '';
            list.forEach(g => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><span class="clickable-name" onclick="showSpec('${g.name}')">${g.name}</span></td><td>${g.size}</td><td class="ket-${g.description.toLowerCase().replace(' ', '-')}">${g.description}</td>`;
                tableBody.appendChild(tr);
            });
            count.textContent = `Menampilkan ${list.length} dari ${allGames.length} game`;
        }

        function filter() {
            const term = searchInput.value.toLowerCase();
            let games = [...allGames];
            if (term) games = games.filter(g => g.name.toLowerCase().includes(term));
            if (currentCategoryFilter) games = games.filter(g => g.description.toLowerCase() === currentCategoryFilter.toLowerCase());
            if (currentGenreFilter) games = games.filter(g => g.genre.includes(currentGenreFilter));
            render(games);
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                if (btn.classList.contains('active')) { btn.classList.remove('active'); currentCategoryFilter = null;
                } else { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentCategoryFilter = btn.dataset.filter; }
                filter();
            };
        });

        document.querySelectorAll('.genre-btn').forEach(btn => {
            btn.onclick = () => {
                if (btn.classList.contains('active')) { btn.classList.remove('active'); currentGenreFilter = null;
                } else { document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentGenreFilter = btn.dataset.filter; }
                filter();
            };
        });

        searchInput.onkeyup = filter;
        document.querySelector('.close-btn').onclick = () => modal.style.display = "none";
        window.onclick = (e) => { if(e.target == modal) modal.style.display = "none"; };
        render(allGames);
    });
</script>
</body>
