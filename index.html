<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mengalihkan… — LinkGames</title>
<style>
  :root{
    --bg0:#05060a;
    --bg1:#0a0f1f;
    --accent:#5E9FE8;
    --accent2:#9b6bff;
    --accent3:#37e5c0;
    --text:#ffffff;
    --muted:rgba(255,255,255,.62);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(140% 120% at 50% -10%, #16203f 0%, var(--bg1) 42%, var(--bg0) 100%);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }

  /* animated aurora glow blobs */
  .glow{position:absolute;border-radius:50%;filter:blur(70px);opacity:.55;pointer-events:none}
  .glow.a{width:460px;height:460px;background:var(--accent);top:-120px;left:-80px;animation:float1 12s ease-in-out infinite}
  .glow.b{width:420px;height:420px;background:var(--accent2);bottom:-140px;right:-100px;animation:float2 14s ease-in-out infinite}
  .glow.c{width:320px;height:320px;background:var(--accent3);bottom:20%;left:12%;opacity:.35;animation:float1 16s ease-in-out infinite}
  @keyframes float1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,30px) scale(1.12)}}
  @keyframes float2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,-24px) scale(1.15)}}

  /* subtle star grid */
  .stars{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.5) 1px, transparent 1px);background-size:42px 42px;opacity:.06;pointer-events:none}

  .card{
    position:relative;
    z-index:2;
    width:min(92vw,440px);
    padding:48px 40px 40px;
    text-align:center;
    background:rgba(255,255,255,.055);
    border:1px solid rgba(255,255,255,.12);
    border-radius:24px;
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    box-shadow:0 24px 60px rgba(0,0,0,.45);
    animation:rise .8s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(26px) scale(.97)}to{opacity:1;transform:none}}

  /* orbit loader */
  .orbit{
    position:relative;width:96px;height:96px;margin:0 auto 28px;
  }
  .orbit .ring{
    position:absolute;inset:0;border-radius:50%;
    border:2px solid transparent;
    border-top-color:var(--accent);
    border-right-color:var(--accent2);
    animation:spin 1.1s linear infinite;
  }
  .orbit .ring.slow{inset:12px;border-top-color:var(--accent3);border-right-color:transparent;animation-duration:1.8s;animation-direction:reverse}
  @keyframes spin{to{transform:rotate(360deg)}}
  .orbit .core{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:34px;animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.12);opacity:1}}

  h1{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:10px}
  .brand{
    background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  p{font-size:15px;line-height:1.5;color:var(--muted);margin-bottom:26px}

  /* progress bar */
  .bar{height:6px;width:100%;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;margin-bottom:22px}
  .bar > span{display:block;height:100%;width:0;border-radius:999px;
    background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));
    animation:load 2s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes load{to{width:100%}}

  .link{
    display:inline-flex;align-items:center;gap:8px;
    font-size:14px;color:var(--text);text-decoration:none;font-weight:600;
    padding:11px 20px;border-radius:12px;
    border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06);
    transition:transform .2s ease, background .2s ease, border-color .2s ease;
  }
  .link:hover{transform:translateY(-2px);background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.32)}
  .link .arrow{transition:transform .2s ease}
  .link:hover .arrow{transform:translateX(4px)}

  .foot{margin-top:22px;font-size:12px;color:rgba(255,255,255,.4)}

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important}
    .bar > span{width:100%}
  }
</style>
</head>
<body>
  <div class="glow a"></div>
  <div class="glow b"></div>
  <div class="glow c"></div>
  <div class="stars"></div>

  <main class="card">
    <div class="orbit">
      <div class="ring"></div>
      <div class="ring slow"></div>
      <div class="core">🎮</div>
    </div>
    <h1>Mengalihkan ke <span class="brand">LinkGames</span></h1>
    <p>Tunggu sebentar, kami sedang membawa kamu ke halaman baru…</p>
    <div class="bar"><span></span></div>
    <a class="link" href="https://www.linkgames.id/">
      Lanjut sekarang <span class="arrow">→</span>
    </a>
    <div class="foot">www.linkgames.id</div>
  </main>

  <script>
    var TARGET = "https://www.linkgames.id/";
    // Redirect after the progress animation (~2s).
    setTimeout(function(){ window.location.replace(TARGET); }, 2000);
  </script>
</body>
</html>
