<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Game Link.Yu - Powered by RAWG</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: #050505;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .search-container { padding: 20px; background: #fafafa; border-bottom: 1px solid #eee; }
        #searchInput {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        #searchInput:focus { border-color: #1a73e8; }

        .table-wrapper { max-height: 60vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; position: sticky; top: 0; padding: 15px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; }

        .btn-spec {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-spec:hover { background: #1557b0; }

        /* MODAL STYLES */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            width: 90%;
            max-width: 600px;
            border-radius: 15px;
            position: relative;
            animation: slideDown 0.3s ease;
            max-height: 85vh;
            overflow-y: auto;
        }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .close-btn { font-size: 30px; cursor: pointer; color: #aaa; }
        .modal-body { padding: 20px; line-height: 1.6; }
        
        .req-box { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 5px solid #1a73e8; white-space: pre-line; font-size: 14px; }
        .loading-spinner { text-align: center; padding: 40px; }
        .game-img { width: 100%; border-radius: 10px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="margin:0">Daftar Game Link.Yu</h1>
        <p style="margin:10px 0 0; opacity:0.7">Data spesifikasi langsung dari Database RAWG</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Cari game (Contoh: GTA V, Elden Ring, PES 2021)...">
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 60%;">Judul Game</th>
                    <th>Size</th>
                    <th>Opsi</th>
                </tr>
            </thead>
            <tbody id="gameListBody">
                </tbody>
        </table>
    </div>
</div>

<div id="specModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle" style="margin:0; font-size: 20px;">Spesifikasi Game</h2>
            <span class="close-btn">&times;</span>
        </div>
        <div class="modal-body" id="modalBody">
            <div class="loading-spinner">Mencari data ke database RAWG...</div>
        </div>
    </div>
</div>

<script src="data_game.js"></script>

<script>
    // === KONFIGURASI API ===
    const apiKey = "158b3858daed4d67af02a839d14ba445"; // Dapatkan di rawg.io/apidocs
    let allGames = [];

    // 1. Ambil data dari file data_game.js
    function init() {
        if (typeof csvData === 'undefined') {
            document.getElementById('gameListBody').innerHTML = '<tr><td colspan="3" style="text-align:center">File data_game.js tidak ditemukan atau csvData kosong.</td></tr>';
            return;
        }

        const lines = csvData.split('\n');
        const map = new Map();
        let start = false;

        for (const line of lines) {
            if (line.startsWith('NAMA GAME,SIZE')) { start = true; continue; }
            if (!start || line.trim() === '') continue;

            const part = line.split(',');
            if (part.length >= 2) {
                const name = part[0].replace(/"/g, '').trim();
                const size = part[1].trim();
                if (name && !name.includes('.mp4')) {
                    map.set(name, { name, size });
                }
            }
        }
        allGames = Array.from(map.values());
        render(allGames);
    }

    function render(data) {
        const tbody = document.getElementById('gameListBody');
        tbody.innerHTML = '';
        data.forEach(g => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight: 500;">${g.name}</td>
                <td style="color: #666;">${g.size}</td>
                <td><button class="btn-spec" onclick="fetchSpec('${g.name}')">CEK SPEK</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 2. FUNGSI AMBIL DATA DARI RAWG API
    async function fetchSpec(gameName) {
        const modal = document.getElementById('specModal');
        const body = document.getElementById('modalBody');
        const title = document.getElementById('modalTitle');
        
        title.textContent = gameName;
        body.innerHTML = '<div class="loading-spinner">Sedang menghubungi server RAWG...</div>';
        modal.style.display = "block";

        try {
            // Langkah A: Cari ID Game berdasarkan nama
            const searchRes = await fetch(`https://api.rawg.io/api/games?key=${apiKey}&search=${encodeURIComponent(gameName)}&page_size=1`);
            const searchData = await searchRes.json();

            if (searchData.results.length === 0) {
                body.innerHTML = "<p>Maaf, data game tidak ditemukan di database RAWG.</p>";
                return;
            }

            const gameId = searchData.results[0].id;

            // Langkah B: Ambil detail game (termasuk Requirements)
            const detailRes = await fetch(`https://api.rawg.io/api/games/${gameId}?key=${apiKey}`);
            const detailData = await detailRes.json();

            // Langkah C: Tampilkan data
            let specHtml = "";
            
            // Gambar Game
            if (detailData.background_image) {
                specHtml += `<img src="${detailData.background_image}" class="game-img" style="display:block">`;
            }

            // Cari spek PC (Platforms ID 4 adalah PC)
            const pcPlatform = detailData.platforms.find(p => p.platform.id === 4);
            
            if (pcPlatform && pcPlatform.requirements && pcPlatform.requirements.minimum) {
                specHtml += `<h3>System Requirements (PC)</h3>`;
                specHtml += `<div class="req-box">${pcPlatform.requirements.minimum}</div>`;
                if (pcPlatform.requirements.recommended) {
                    specHtml += `<br><h3>Recommended</h3>`;
                    specHtml += `<div class="req-box" style="border-left-color: #28a745;">${pcPlatform.requirements.recommended}</div>`;
                }
            } else {
                specHtml += `<h3>Info Game</h3><p>${detailData.description_raw.substring(0, 300)}...</p>`;
                specHtml += `<p style="color:red">Spesifikasi teks tidak tersedia di RAWG untuk game ini. Silakan cek di Steam.</p>`;
            }

            body.innerHTML = specHtml;

        } catch (error) {
            body.innerHTML = "<p>Terjadi kesalahan koneksi ke API. Pastikan API Key kamu benar.</p>";
            console.error(error);
        }
    }

    // Search Logic
    document.getElementById('searchInput').onkeyup = function() {
        const term = this.value.toLowerCase();
        const filtered = allGames.filter(g => g.name.toLowerCase().includes(term));
        render(filtered);
    };

    // Modal Close
    document.querySelector('.close-btn').onclick = () => document.getElementById('specModal').style.display = "none";
    window.onclick = (e) => { if (e.target.className === 'modal') document.getElementById('specModal').style.display = "none"; };

    window.onload = init;
</script>

</body>
</html>
