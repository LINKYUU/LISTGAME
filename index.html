<style>
    :root {
        --primary-navy: #0a192f;
        --secondary-navy: #112240;
        --accent-blue: #007bff;
        --text-light: #e6f1ff;
        --text-gray: #8892b0;
        --white: #ffffff;
    }

    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--primary-navy);
        color: var(--text-light);
        margin: 0;
        padding: 20px;
        line-height: 1.6;
    }

    .container {
        max-width: 1000px;
        margin: 0 auto;
        background-color: var(--secondary-navy);
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.1);
    }

    header { 
        padding: 30px; 
        border-bottom: 1px solid rgba(255,255,255,0.1);
        background: linear-gradient(to bottom, #112240, #0a192f);
    }

    .special-notice {
        background: rgba(217, 83, 79, 0.1);
        border: 1px solid #d9534f;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 10px;
        text-align: center;
    }

    .special-notice p { margin: 5px 0; font-size: 18px; font-weight: 600; color: #ff6b6b; }
    .special-notice p.whatsapp { color: var(--text-light); }
    .special-notice p.shopee-link a { 
        color: #4da3ff; 
        text-decoration: none; 
        border-bottom: 1px dashed #4da3ff;
    }

    h1 { 
        text-align: center; 
        color: var(--white); 
        letter-spacing: 1px;
        text-transform: uppercase;
        font-size: 24px;
    }

    #searchInput {
        width: 100%; 
        padding: 15px; 
        margin-top: 20px;
        font-size: 16px; 
        border: 1px solid rgba(255,255,255,0.2); 
        border-radius: 8px; 
        box-sizing: border-box;
        background-color: var(--primary-navy);
        color: white;
        transition: border 0.3s;
    }

    #searchInput:focus {
        outline: none;
        border-color: var(--accent-blue);
        box-shadow: 0 0 8px rgba(0,123,255,0.4);
    }

    #filterContainer, #genreFilterContainer {
        margin-top: 15px; 
        display: flex; 
        flex-wrap: wrap; 
        justify-content: center; 
        gap: 10px;
    }

    .filter-btn, .genre-btn {
        padding: 10px 18px; 
        font-size: 13px; 
        font-weight: 600; 
        background-color: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1); 
        border-radius: 30px; 
        cursor: pointer; 
        color: var(--text-gray); 
        transition: all 0.3s ease;
    }

    .filter-btn:hover, .genre-btn:hover {
        background-color: rgba(255,255,255,0.1);
        color: var(--white);
    }

    /* Active States */
    .filter-btn.active[data-filter="Ringan"] { background-color: #28a745; color: white; border-color: #28a745; }
    .filter-btn.active[data-filter="Sedang"] { background-color: #007bff; color: white; border-color: #007bff; }
    .filter-btn.active[data-filter="Agak Berat"] { background-color: #fd7e14; color: white; border-color: #fd7e14; }
    .filter-btn.active[data-filter="Berat"] { background-color: #dc3545; color: white; border-color: #dc3545; }
    .genre-btn.active { background-color: var(--accent-blue); color: white; border-color: var(--accent-blue); }

    .table-wrapper { 
        max-height: 60vh; 
        overflow-y: auto; 
    }

    #gameTable { width: 100%; border-collapse: collapse; }
    
    #gameTable th { 
        background-color: rgba(0,0,0,0.2); 
        color: var(--accent-blue);
        text-transform: uppercase;
        font-size: 13px;
        letter-spacing: 1px;
        padding: 15px;
        position: sticky; 
        top: 0; 
        z-index: 1; 
    }

    #gameTable td { 
        padding: 15px; 
        border-bottom: 1px solid rgba(255,255,255,0.05); 
    }

    #gameTable tr:hover {
        background-color: rgba(255,255,255,0.02);
    }

    .clickable-name { 
        color: #4da3ff; 
        cursor: pointer; 
        font-weight: 500; 
        transition: color 0.2s;
    }
    
    .clickable-name:hover { color: #fff; text-decoration: underline; }

    /* Modal Styling */
    .modal {
        display: none; 
        position: fixed; 
        z-index: 1000; 
        left: 0; top: 0; width: 100%; height: 100%;
        background: rgba(10, 25, 47, 0.85); 
        backdrop-filter: blur(8px);
    }

    .modal-content {
        background: var(--secondary-navy); 
        margin: 10% auto; 
        padding: 25px; 
        width: 90%; 
        max-width: 500px;
        border-radius: 15px; 
        position: relative; 
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        color: var(--text-light);
    }

    .close-btn { 
        position: absolute; 
        right: 20px; 
        top: 15px; 
        font-size: 28px; 
        cursor: pointer; 
        color: var(--text-gray); 
    }

    .req-text { 
        background: rgba(0,0,0,0.2); 
        padding: 20px; 
        border-radius: 10px; 
        font-size: 14px; 
        border-left: 4px solid var(--accent-blue);
    }

    /* Status Colors */
    .ket-ringan { color: #2ecc71; font-weight: 600; }
    .ket-sedang { color: #3498db; font-weight: 600; }
    .ket-agak-berat { color: #e67e22; font-weight: 600; }
    .ket-berat { color: #e74c3c; font-weight: 600; }

    .instruction-text {
        text-align: center; 
        margin: 20px 0; 
        font-weight: bold; 
        color: #ffda79; 
        font-size: 14px;
        text-transform: uppercase;
    }

    /* Scrollbar Customization */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--primary-navy); }
    ::-webkit-scrollbar-thumb { background: var(--secondary-navy); border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
</style>
