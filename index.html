<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Pindah</title>
    <style>
        /* CSS Reset & Styling Dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #e2e8f0;
        }

        .link-box {
            display: inline-block;
            padding: 15px 30px;
            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.5rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .link-box:hover {
            background-color: #2563eb;
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.4);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>PENGUMUMAN</h1>
        <p>Mohon maaf, layanan kami telah berpindah ke alamat baru yang lebih stabil.</p>
        
        <a href="https://www.listgame.my.id" class="link-box">WEB PINDAH KESINI</a>
        
        <div class="footer">
            <p>Silakan klik tombol di atas untuk melanjutkan</p>
        </div>
    </div>

</body>
</html>
